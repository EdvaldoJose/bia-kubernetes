services:
  server:
    build: .
    container_name: bia
    ports:
      - 3002:8080
    depends_on:
      - database
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres   # corrigido
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: bia
  database:
    image: postgres:17.1
    container_name: database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bia
    ports:
      - 5433:5432
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db: